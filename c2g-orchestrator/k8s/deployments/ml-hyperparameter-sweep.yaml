apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-hyperparameter-sweep
  namespace: default
  labels:
    load-type: flexible
    energy-priority: low
    c2g/managed: "true"
    app: ml-hyperparameter-sweep
spec:
  replicas: 20
  selector:
    matchLabels:
      app: ml-hyperparameter-sweep
  template:
    metadata:
      labels:
        load-type: flexible
        energy-priority: low
        c2g/managed: "true"
        app: ml-hyperparameter-sweep
      annotations:
        c2g/power-per-replica-kw: "6"
        c2g/idle-power-kw: "15"
        c2g/shed-threshold-mwh: "1000"
        c2g/workload-type: gpu-training
        c2g/criticality: flexible
        c2g/max-replicas: "20"
    spec:
      containers:
        - name: sweep
          image: nvidia/cuda:12.0-base
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: "6"
              memory: "32Gi"
            limits:
              cpu: "6"
              memory: "32Gi"
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "2"]
      terminationGracePeriodSeconds: 30
